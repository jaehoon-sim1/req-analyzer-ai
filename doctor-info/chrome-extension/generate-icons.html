<!DOCTYPE html>
<html>
<head><title>아이콘 생성기</title></head>
<body>
<p>아래 캔버스를 우클릭하여 PNG로 저장하세요:</p>
<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
[16, 48, 128].forEach(size => {
  const c = document.getElementById('c' + size);
  const ctx = c.getContext('2d');
  const r = size * 0.15;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fillStyle = '#2563eb';
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${size * 0.4}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('DI', size/2, size/2 + size*0.02);
});
</script>
</body>
</html>
