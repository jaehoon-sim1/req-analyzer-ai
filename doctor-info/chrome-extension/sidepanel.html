<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>닥터인포</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 헤더 */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid #262626;
    }
    .header .logo {
      width: 28px; height: 28px;
      background: #2563eb;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 11px;
    }
    .header h1 { font-size: 14px; font-weight: 600; }
    .open-full {
      margin-left: auto;
      background: none;
      border: 1px solid #333;
      color: #999;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
    }
    .open-full:hover { color: #fff; border-color: #555; }

    /* 메시지 */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 90%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #2563eb;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1f1f1f;
      border-bottom-left-radius: 4px;
    }
    .msg.assistant .label {
      font-size: 10px;
      color: #60a5fa;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: #666;
      text-align: center;
      gap: 8px;
    }
    .welcome .icon {
      width: 48px; height: 48px;
      background: rgba(37, 99, 235, 0.2);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #60a5fa;
    }

    /* 입력 */
    .input-area {
      padding: 12px;
      border-top: 1px solid #262626;
    }
    .input-row {
      display: flex;
      gap: 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 8px 12px;
    }
    .input-row:focus-within { border-color: #2563eb; }
    .input-row textarea {
      flex: 1;
      background: none;
      border: none;
      color: #fff;
      font-size: 13px;
      resize: none;
      outline: none;
      font-family: inherit;
      max-height: 100px;
    }
    .input-row textarea::placeholder { color: #555; }
    .send-btn {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      align-self: flex-end;
    }
    .send-btn:hover { background: #1d4ed8; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* 로딩 */
    .typing span {
      display: inline-block;
      width: 6px; height: 6px;
      background: #555;
      border-radius: 50%;
      margin-right: 3px;
      animation: bounce 1s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">DI</div>
    <h1>닥터인포</h1>
    <button class="open-full" id="openFull">전체 화면</button>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="icon">DI</div>
      <div style="color: #ccc; font-size: 14px;">안녕하세요!</div>
      <div style="font-size: 12px;">무엇이든 물어보세요.</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea
        id="input"
        rows="1"
        placeholder="메시지를 입력하세요..."
      ></textarea>
      <button class="send-btn" id="sendBtn" disabled>전송</button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
